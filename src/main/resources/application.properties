spring.application.name=incosure-backend
server.port=${PORT:8080}
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# MySQL configuration
spring.datasource.url=jdbc:mysql://localhost:3306/incosure_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# External API placeholders (used in later steps)
openweather.api.base-url=https://api.openweathermap.org/data/2.5/weather
openweather.api.key=replace_with_openweather_api_key

# Scheduler placeholder (used in later steps)
app.scheduler.monitor-interval-ms=30000

# CORS (comma-separated allowed origin patterns)
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*
