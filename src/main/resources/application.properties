spring.application.name=incosure-frontend-only
server.port=${PORT:8080}

# Disable all database and ORM functionality
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Note: This application runs as frontend-only with all data stored in browser localStorage
# No backend services, database, or APIs are available or needed
